wickr_Scenario_Basics:
  title: Get started with &Wickr; using an &AWS; SDK
  title_abbrev: Get started with &Wickr;
  synopsis: learn core operations for &Wickr; by creating secure communication networks, managing users, and configuring security features.
  category: Scenarios
  languages:
    Python:
      versions:
        - sdk_version: 3
          github: python/example_code/wickr
          excerpts:
            - description: Create an interactive scenario that demonstrates &Wickr; network management, user creation, secure messaging, and compliance features.
              snippet_tags:
                - python.example_code.wickr.WickrScenario
  services:
    wickr: {CreateNetwork, CreateUser, CreateRoom, SendMessage, UploadFile, SetMessageExpiration, EnableBurnOnRead, GetAuditLogs, DeleteNetwork}
